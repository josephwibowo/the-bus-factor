name: seed.github_issues
type: duckdb.seed
description: |
  Aggregated per-repo issue responsiveness for the last 180 days.

parameters:
  path: ../../fixtures/github_issues.csv

tags:
  - fixture
  - layer:seed
  - source:github

columns:
  - name: repo_url
    type: varchar
    checks:
      - name: not_null
      - name: unique
  - name: issues_opened_last_180d
    type: bigint
    checks:
      - name: non_negative
  - name: median_time_to_first_response_days
    type: double
    description: Median days to first maintainer response on eligible issues.
    checks:
      - name: non_negative
