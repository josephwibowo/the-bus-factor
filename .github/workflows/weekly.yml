name: Weekly snapshot

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — after reporting-window boundary.
  workflow_dispatch:

permissions:
  contents: write # commit refreshed public-data/ bundle
  pages: write
  id-token: write

concurrency:
  group: weekly-snapshot
  cancel-in-progress: false

env:
  BQ_MAX_BYTES_BILLED: "10000000000" # 10 GB per query cost guardrail
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    name: Live run + export + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked

      - name: Install Bruin CLI
        run: |
          curl -LsSf https://getbruin.com/install/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Render .bruin.yml from secrets
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          envsubst < .bruin.yml.example > .bruin.yml || cp .bruin.yml.example .bruin.yml

      - name: Validate
        run: bruin validate pipeline/pipeline.yml

      - name: Run live pipeline
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
        run: |
          bruin run -e ci_live_bq \
            --var 'source_mode="live"' \
            --var 'warehouse="bigquery"' \
            pipeline/pipeline.yml

      - name: Size-cap public-data (<25MB)
        run: |
          size=$(du -sb public-data | awk '{print $1}')
          echo "public-data size = $size bytes"
          if [ "$size" -ge 26214400 ]; then
            echo "::error::public-data exceeds 25MB (hard cap)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter ./web build

      - name: Commit refreshed public-data bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public-data/ reports/ analysis/
          msg="chore(weekly): refresh snapshot $(date -u +%Y-%m-%d)"
          git commit -m "$msg" || echo "No changes"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
