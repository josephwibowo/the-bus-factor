name: seed.github_contributors
type: duckdb.seed
description: |
  Aggregated per-repo all-time contributor concentration: top-1 contributor
  share and total distinct contributor count.

parameters:
  path: ../../fixtures/github_contributors.csv

tags:
  - fixture
  - layer:seed
  - source:github

columns:
  - name: repo_url
    type: varchar
    checks:
      - name: not_null
      - name: unique
  - name: top_contributor_share_all_time
    type: double
    description: Share in [0, 1] of all-time commits by the single most active contributor.
    checks:
      - name: non_negative
  - name: contributors_all_time
    type: bigint
    checks:
      - name: non_negative
