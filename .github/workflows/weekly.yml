name: Weekly snapshot

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC — after reporting-window boundary.
  workflow_dispatch:
    inputs:
      snapshot_week:
        description: "Optional ISO Monday date to replay, e.g. 2026-04-20. Empty uses the most recent Monday UTC."
        required: false
        type: string

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: weekly-snapshot
  cancel-in-progress: false

env:
  BQ_MAX_BYTES_BILLED: "10000000000" # 10 GB per query cost guardrail
  BQ_DATASET_PREFIX: "bus_factor_prod"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-pipeline:
    name: Live run + export + publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
      - run: uv python install
      - run: uv sync --locked

      - name: Install Bruin CLI
        run: |
          curl -LsSf https://getbruin.com/install/cli | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Bootstrap .bruin.yml
        run: cp .bruin.yml.example .bruin.yml

      - name: Create data directory (DuckDB parent path)
        run: mkdir -p data

      - name: Validate
        run: bruin validate pipeline/pipeline.yml

      - name: Run live pipeline
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          INGEST_TOKEN: ${{ secrets.INGEST_TOKEN }}
          SNAPSHOT_WEEK: ${{ inputs.snapshot_week || '' }}
        run: |
          uv run python -c 'import os; from pipeline.lib.snapshot import resolve_snapshot; from pipeline.lib import sources; sources.clear_buffer(resolve_snapshot(os.environ.get("SNAPSHOT_WEEK") or None).iso)'

          snapshot_args=()
          if [ -n "$SNAPSHOT_WEEK" ]; then
            snapshot_args+=(--var "snapshot_week=\"$SNAPSHOT_WEEK\"")
          fi

          bruin run --workers=1 -e ci_live_bq \
            --var 'source_mode="live"' \
            --var 'warehouse="bigquery"' \
            "${snapshot_args[@]}" \
            pipeline/pipeline.yml

      - name: Build public snapshot from BigQuery marts
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
          GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
          SNAPSHOT_WEEK: ${{ inputs.snapshot_week || '' }}
        run: |
          uv run python scripts/run_bigquery_smoke.py \
            --duckdb-path data/ci_live_bq.duckdb \
            --dataset-prefix "$BQ_DATASET_PREFIX" \
            --source-mode live \
            --warehouse bigquery \
            --snapshot-week "$SNAPSHOT_WEEK" \
            --export-public-data \
            --require-healthy-sources

      - name: Size-cap public-data (<25MB)
        run: |
          size=$(du -sb public-data | awk '{print $1}')
          echo "public-data size = $size bytes"
          if [ "$size" -ge 26214400 ]; then
            echo "::error::public-data exceeds 25MB (hard cap)"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - uses: pnpm/action-setup@v4
      - run: pnpm install --frozen-lockfile

      - name: Stage generated snapshot assets for deploy
        run: |
          mkdir -p web/public/public-data web/public/weekly
          rsync -a --delete public-data/ web/public/public-data/
          rsync -a --delete reports/cards/ web/public/weekly/

      - run: pnpm --filter ./web build

      - name: Upload generated snapshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: weekly-snapshot-${{ github.run_id }}
          path: |
            public-data/
            reports/cards/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy-pages:
    needs: run-pipeline
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
