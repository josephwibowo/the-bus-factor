name: Deploy Pages

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SITE_BASE_URL: https://josephwibowo.github.io/the-bus-factor

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile

      - name: Fetch currently deployed snapshot assets
        run: |
          mkdir -p web/public/public-data web/public/weekly
          for path in public-data/*.json; do
            name="$(basename "$path")"
            curl -fsSL "$SITE_BASE_URL/public-data/$name" -o "web/public/public-data/$name"
          done
          curl -fsSL "$SITE_BASE_URL/weekly/latest.png" -o "web/public/weekly/latest.png"

      - name: Guard against fixture/synthetic snapshot deploys
        run: |
          node -e '
            const fs = require("fs");
            const metadata = JSON.parse(fs.readFileSync("web/public/public-data/metadata.json", "utf8"));
            const sources = JSON.parse(fs.readFileSync("web/public/public-data/sources.json", "utf8"));
            const metadataText = JSON.stringify(metadata).toLowerCase();
            const sourcesText = JSON.stringify(sources).toLowerCase();
            const hasFixtureMarker =
              metadataText.includes("synthetic fixture") ||
              metadataText.includes("fixture run") ||
              sourcesText.includes("fixture run; synthetic success");
            if (hasFixtureMarker) {
              console.error("Refusing Pages deploy: deployed snapshot appears to be fixture/synthetic.");
              process.exit(1);
            }
          '

      - run: pnpm --filter ./web build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
